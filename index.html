<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fr Jules-Davy IELTS Reading</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --paper: #ffffff;
      --ink: #1f2933;
      --muted: #5b6673;
      --accent: #6b4f2a;
      --accent2: #0f5e56;
      --line: #d7d0c4;
      --soft: #efe8dc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 24px;
      line-height: 1.5;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 44px 34px;
      text-align: center;
      box-shadow: 0 8px 28px rgba(31, 41, 51, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      color: var(--accent);
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.1;
    }

    p {
      margin: 0 auto 28px;
      max-width: 560px;
      color: var(--muted);
      font-size: 20px;
    }

    .button {
      display: inline-block;
      background: var(--accent2);
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 18px;
      padding: 14px 28px;
      border-radius: 14px;
      border: 1px solid var(--accent2);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(15, 94, 86, 0.22);
    }

    .note {
      margin-top: 28px;
      padding: 14px;
      background: var(--soft);
      border-radius: 14px;
      color: var(--ink);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome to Fr Jules-Davy’s IELTS Reading Web Page</h1>
    <p>Click on Start to go to the Main Menu.</p>
    <a class="button" href="ielts_final_week_index_v3.html">Start</a>
    <div class="note">
      IELTS Reading practice lessons for Days 3–5.
    </div>
  </main>
</body>
</html>
